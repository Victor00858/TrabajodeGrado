<div class="row">
    <div class="col-md-4 mx-auto">
        <div class="card">
            <div class="card-header">
                Inicia sesión en Losses
            </div>
            <div class="card-body">
              <form (submit)="SignIn()">
                <div class="form-group p-0">
                    <input type="text" [(ngModel)]="user.usuario" name="usuario" class="form-control" placeholder="usuario" required autofocus>
                </div>
                <div class="form-group">
                    <input type="password" [(ngModel)]="user.password" name="password" class="form-control" placeholder="password" required>
                </div>
                <button type="submit" class="btn btn-primary">
                    Ingresar
                </button>
              </form>
            </div>
        </div>
    </div>
</div>
